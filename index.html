<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Pulse 🌍</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b0b1a;
    color:white;
}

header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#111133;
}

.hamburger {
    font-size:28px;
    cursor:pointer;
    user-select:none;
}

.search input {
    width:100%;
    padding:10px;
    border-radius:20px;
    border:none;
}

.sidebar {
    position:fixed;
    left:-260px;
    top:0;
    width:250px;
    height:100%;
    background:#111;
    padding:10px;
    transition:0.3s;
}

.sidebar.open { left:0; }

.panel {
    display:flex;
    flex-wrap:wrap;
    padding:10px;
}

.card {
    background:#1a1a33;
    margin:10px;
    padding:15px;
    border-radius:12px;
    width:200px;
}

.section-title {
    margin:15px;
    color:#00ffcc;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="sidebar" id="sidebar">
    <h3>Menu</h3>
    <button onclick="loadMemes()">🚀 Trending Memecoins</button>
    <button onclick="loadNews()">📰 Crypto News</button>
</div>

<header>
    <div class="hamburger" onclick="toggleMenu()">☰</div>

    <div class="search">
        <input id="search" placeholder="Search coin...">
    </div>
</header>

<div class="section-title">Live Market</div>
<div class="panel" id="coins"></div>

<div class="section-title">🔥 Trending Memecoins</div>
<div class="panel" id="extra"></div>

<script>

// ================= MENU =================
function toggleMenu(){
 document.getElementById("sidebar").classList.toggle("open");
}

// ================= MARKET =================
async function loadCoins(){
 const res = await fetch(
 "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=10&page=1"
 );
 const data = await res.json();

 let box = document.getElementById("coins");
 box.innerHTML = "";

 data.forEach(c=>{
  box.innerHTML += `
   <div class="card">
    <h3>${c.symbol.toUpperCase()}</h3>
    <p>$${c.current_price}</p>
    <p style="color:${c.price_change_percentage_24h>0?'lime':'red'}">
    ${c.price_change_percentage_24h.toFixed(2)}%
    </p>
   </div>
  `;
 });
}

// ================= MEMECOINS (HYPE REAL) =================
async function loadMemes(){

 const res = await fetch(
 "https://api.coingecko.com/api/v3/search/trending"
 );
 const data = await res.json();

 let box = document.getElementById("extra");
 box.innerHTML = "";

 data.coins.forEach(item=>{
  let c = item.item;

  box.innerHTML += `
   <div class="card">
    <h3>🐸 ${c.symbol}</h3>
    <p>${c.name}</p>
    <small>#${c.market_cap_rank || "new"}</small>
   </div>
  `;
 });
}

// ================= NEWS REAL =================
async function loadNews(){

 let box = document.getElementById("extra");
 box.innerHTML = "Loading news...";

 try {
    const res = await fetch(
    "https://api.coingecko.com/api/v3/status_updates"
    );
    const data = await res.json();

    box.innerHTML = "";

    data.status_updates.slice(0,3).forEach(n=>{
        box.innerHTML += `
        <div class="card">
            📰 ${n.description.slice(0,100)}...
        </div>`;
    });

 } catch(e){
    box.innerHTML = "No news available";
 }
}

// ================= SEARCH =================
document.getElementById("search").addEventListener("input", async (e)=>{
 let q = e.target.value;
 if(q.length<2) return;

 const res = await fetch(`https://api.coingecko.com/api/v3/search?query=${q}`);
 const data = await res.json();

 let box = document.getElementById("coins");
 box.innerHTML = "";

 data.coins.slice(0,5).forEach(c=>{
  box.innerHTML += `
   <div class="card">
    <h3>${c.name}</h3>
    <p>${c.symbol}</p>
   </div>
  `;
 });
});

loadCoins();
setInterval(loadCoins, 15000);

</script>

</body>
</html>
