<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinHat Feeds 🤠</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Comic+Neue:wght@700&display=swap');

    body {
        margin: 0;
        font-family: 'Comic Neue', cursive;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        color: white;
        overflow-x: hidden;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 30px;
        background: rgba(0, 0, 0, 0.8);
        border-bottom: 4px solid #ff00ff;
        box-shadow: 0 0 20px #ff00ff;
        flex-wrap: wrap;
        gap: 15px;
    }

    .logo {
        font-size: 28px;
        font-weight: bold;
        text-shadow: 0 0 15px #00ff88, 0 0 25px #ffff00;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .search-container {
        flex: 1;
        max-width: 500px;
        position: relative;
    }

    .search-box {
        width: 100%;
        padding: 15px 20px 15px 55px;
        font-size: 18px;
        background: #1a0033;
        border: 3px solid #00ffff;
        border-radius: 50px;
        color: white;
        outline: none;
        box-shadow: 0 0 20px #00ffff;
    }

    .search-box:focus {
        box-shadow: 0 0 30px #ffff00;
    }

    .lupa {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 24px;
        color: #ffff00;
    }

    .lang-btn {
        font-size: 32px;
        cursor: pointer;
        transition: transform 0.3s;
    }

    .lang-btn:hover { transform: rotate(20deg) scale(1.2); }

    .container { display: flex; flex-wrap: wrap; }

    .feed {
        flex: 3;
        padding: 20px;
        min-width: 300px;
    }

    .coin {
        background: linear-gradient(145deg, #1a0033, #330066);
        margin: 15px 0;
        padding: 18px;
        border-radius: 20px;
        border: 3px solid #00ffff;
        box-shadow: 0 0 25px #00ffff, 0 0 40px rgba(255, 0, 255, 0.6);
        transition: all 0.4s;
        position: relative;
        overflow: hidden;
    }

    .coin:hover {
        transform: scale(1.05) rotate(2deg);
        box-shadow: 0 0 40px #ffff00, 0 0 60px #ff00ff;
    }

    .coin strong {
        font-size: 22px;
        text-transform: uppercase;
        text-shadow: 0 0 10px #ffff00;
    }

    .price {
        font-size: 28px;
        font-weight: bold;
        margin: 8px 0;
        text-shadow: 0 0 15px #00ff88;
    }

    .up { 
        color: #00ff88; 
        text-shadow: 0 0 15px #00ff88;
        animation: pump 1.5s infinite;
    }
    .down { 
        color: #ff4d4d; 
        text-shadow: 0 0 15px #ff4d4d;
    }

    @keyframes pump {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.08); }
    }

    .search-results {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: #1a0033;
        border: 3px solid #00ffff;
        border-top: none;
        border-radius: 0 0 20px 20px;
        max-height: 400px;
        overflow-y: auto;
        z-index: 100;
        box-shadow: 0 10px 30px rgba(0,255,255,0.5);
        display: none;
    }

    .search-item {
        padding: 12px 20px;
        cursor: pointer;
        border-bottom: 1px solid #00ffff33;
    }

    .search-item:hover {
        background: #ff00ff;
        color: black;
    }

    .ads {
        flex: 1;
        background: rgba(10, 5, 30, 0.95);
        padding: 25px;
        border-left: 5px solid #ffff00;
        min-width: 280px;
    }

    .adbox {
        background: linear-gradient(135deg, #ff00ff, #00ffff);
        color: #000;
        font-weight: bold;
        padding: 18px;
        margin-bottom: 15px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 0 20px #ffff00;
        transition: 0.3s;
    }

    .adbox:hover {
        transform: translateY(-8px) scale(1.03);
    }

    h2, h3 {
        text-align: center;
        text-shadow: 0 0 20px #ffff00;
        font-family: 'Press Start 2P', cursive;
        letter-spacing: 2px;
    }

    .lang-menu {
        position: absolute;
        top: 90px;
        right: 30px;
        background: #1a0033;
        padding: 15px;
        border-radius: 15px;
        border: 3px solid #00ffff;
        box-shadow: 0 0 30px #ff00ff;
        display: none;
        z-index: 200;
    }

    .lang-menu div {
        padding: 10px 15px;
        cursor: pointer;
        border-radius: 8px;
        margin: 5px 0;
    }

    .lang-menu div:hover {
        background: #ff00ff;
        color: black;
    }
</style>
</head>

<body>

<header>
    <div class="logo">🤠 CoinHat Feeds <span style="font-size:18px;">🚀 TO THE MOON</span></div>
    
    <div class="search-container">
        <span class="lupa">🔎</span>
        <input type="text" id="searchInput" class="search-box" placeholder="Busque nome, símbolo ou contrato... (ex: pepe, doge, 0x...)">
        <div class="search-results" id="searchResults"></div>
    </div>

    <div class="lang-btn" onclick="toggleLang()">🌍</div>
</header>

<div class="lang-menu" id="langMenu">
    <div onclick="setLang('pt')">🇧🇷 Português</div>
    <div onclick="setLang('en')">🇺🇸 English</div>
    <div onclick="setLang('zh')">🇨🇳 中文</div>
    <div onclick="setLang('es')">🇪🇸 Español</div>
    <div onclick="setLang('jp')">🇯🇵 日本語</div>
    <div onclick="setLang('ru')">🇷🇺 Русский</div>
