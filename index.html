<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Pulse 🌍</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b0b1a;
    color:white;
}

/* HEADER */
header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    background:#111133;
}

/* ICONS */
.icon {
    font-size:26px;
    cursor:pointer;
    margin:0 8px;
}

/* SEARCH */
.search input {
    width:100%;
    padding:10px;
    border-radius:20px;
    border:none;
}

/* SIDEBAR */
.sidebar {
    position:fixed;
    left:-260px;
    top:0;
    width:250px;
    height:100%;
    background:#111;
    padding:10px;
    transition:0.3s;
}
.sidebar.open { left:0; }

/* CARDS */
.panel {
    display:flex;
    flex-wrap:wrap;
    padding:10px;
}

.card {
    background:#1a1a33;
    margin:10px;
    padding:15px;
    border-radius:12px;
    width:200px;
}

/* TITLES */
.section-title {
    margin:15px;
    color:#00ffcc;
}

/* LANG MENU */
.lang-box {
    display:none;
    position:absolute;
    right:10px;
    top:50px;
    background:#222;
    padding:10px;
    border-radius:10px;
}
.lang-box button {
    display:block;
    margin:5px 0;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <h3>Menu</h3>
    <button onclick="loadMemes()">🚀 Top Memecoins</button>
    <button onclick="loadNews()">📰 News</button>
</div>

<!-- HEADER -->
<header>

    <div class="icon" onclick="toggleMenu()">☰</div>

    <div class="search">
        <input id="search" placeholder="Search coin...">
    </div>

    <div class="icon" onclick="toggleLang()">🌍</div>

</header>

<!-- LANG BOX -->
<div class="lang-box" id="langBox">
    <button onclick="setLang('en')">English</button>
    <button onclick="setLang('pt')">Português</button>
    <button onclick="setLang('es')">Español</button>
    <button onclick="setLang('zh')">中文</button>
    <button onclick="setLang('ja')">日本</button>
    <button onclick="setLang('ar')">العربية</button>
</div>

<div class="section-title" id="titleMarket">Live Market</div>
<div class="panel" id="coins"></div>

<div class="section-title" id="titleExtra">Trending Memecoins</div>
<div class="panel" id="extra"></div>

<script>

let lang="en";

// ================= MENU =================
function toggleMenu(){
 document.getElementById("sidebar").classList.toggle("open");
}

function toggleLang(){
 document.getElementById("langBox").style.display =
 document.getElementById("langBox").style.display==="block"?"none":"block";
}

// ================= TRANSLATION =================
const t = {
 en:{market:"Live Market",memes:"Trending Memecoins"},
 pt:{market:"Mercado ao Vivo",memes:"Memecoins em Alta"},
 es:{market:"Mercado en Vivo",memes:"Memecoins Tendencia"},
 zh:{market:"实时市场",memes:"热门迷因币"},
 ja:{market:"ライブ市場",memes:"トレンドミームコイン"},
 ar:{market:"السوق المباشر",memes:"ميمكوين ترند"}
};

function setLang(l){
 lang=l;
 document.getElementById("titleMarket").innerText=t[l].market;
 document.getElementById("titleExtra").innerText=t[l].memes;
}

// ================= MARKET =================
async function loadCoins(){
 const res=await fetch(
 "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=10&page=1"
 );
 const data=await res.json();

 let box=document.getElementById("coins");
 box.innerHTML="";

 data.forEach(c=>{
  box.innerHTML+=`
  <div class="card">
    <h3>${c.symbol.toUpperCase()}</h3>
    <p>$${c.current_price}</p>
    <p style="color:${c.price_change_percentage_24h>0?'lime':'red'}">
    ${c.price_change_percentage_24h.toFixed(2)}%
    </p>
  </div>`;
 });
}

// ================= MEMECOINS (REAL TRENDING) =================
async function loadMemes(){
 const res=await fetch(
 "https://api.coingecko.com/api/v3/search/trending"
 );
 const data=await res.json();

 let box=document.getElementById("extra");
 box.innerHTML="";

 data.coins.slice(0,10).forEach(i=>{
  let c=i.item;

  box.innerHTML+=`
  <div class="card">
    <h3>🐸 ${c.symbol}</h3>
    <p>${c.name}</p>
    <small>#${c.market_cap_rank||"new"}</small>
  </div>`;
 });
}

// ================= NEWS (REAL + FALLBACK) =================
async function loadNews(){

 let box=document.getElementById("extra");
 box.innerHTML="Loading...";

 try {
   const res=await fetch(
   "https://api.coingecko.com/api/v3/status_updates"
   );
   const data=await res.json();

   box.innerHTML="";

   let news=data.status_updates.slice(0,3);

   if(news.length===0){
    box.innerHTML="No news available";
    return;
   }

   news.forEach(n=>{
    box.innerHTML+=`
    <div class="card">📰 ${n.description.slice(0,120)}...</div>`;
   });

 } catch(e){
   box.innerHTML="News error";
 }
}

// ================= SEARCH =================
document.getElementById("search").addEventListener("input",async(e)=>{
 let q=e.target.value;
 if(q.length<2)return;

 const res=await fetch(`https://api.coingecko.com/api/v3/search?query=${q}`);
 const data=await res.json();

 let box=document.getElementById("coins");
 box.innerHTML="";

 data.coins.slice(0,5).forEach(c=>{
  box.innerHTML+=`
  <div class="card">
    <h3>${c.name}</h3>
    <p>${c.symbol}</p>
  </div>`;
 });
});

// INIT
loadCoins();
setInterval(loadCoins,15000);

</script>

</body>
</html>
