<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinHatFeeds 🌍</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#050814;
 color:#00ffd5;
}

header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:12px;
 background:#08122b;
 border-bottom:2px solid #00ffff;
}

.icon{font-size:26px;cursor:pointer}

/* SIDEBAR */
.sidebar{
 position:fixed;
 left:-320px;
 top:0;
 width:300px;
 height:100%;
 background:#06101f;
 padding:15px;
 transition:0.3s;
 overflow-y:auto;
}
.sidebar.open{left:0}

.closeBtn{
 cursor:pointer;
 color:#00ffff;
 font-size:20px;
 display:block;
 margin-bottom:10px;
}

/* GRID */
.panel{
 display:flex;
 flex-wrap:wrap;
 padding:10px;
}

.card{
 background:#0b1a33;
 margin:10px;
 padding:12px;
 border-radius:12px;
 width:220px;
 border:1px solid #00ffff;
}

/* CHART */
canvas{
 width:100%;
 height:60px;
}

/* NEWS */
.news{
 background:#081f3a;
 margin:8px 0;
 padding:10px;
 border-left:3px solid #00ffff;
 font-size:13px;
}

/* TITLES */
.title{
 margin:15px;
 color:#00ffff;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
 <span class="closeBtn" onclick="toggleMenu()">← Fechar</span>

 <h3>📰 News</h3>
 <div id="newsBox">Loading...</div>

 <hr>
 <button onclick="loadMemes()">🚀 Memecoins</button>
</div>

<!-- HEADER -->
<header>
 <div class="icon" onclick="toggleMenu()">☰</div>
 <h3>CoinHatFeeds</h3>
 <div class="icon">🌍</div>
</header>

<div class="title">🚀 Memecoins Trending (with price + chart)</div>
<div class="panel" id="memes"></div>

<script>

// ================= MENU =================
function toggleMenu(){
 document.getElementById("sidebar").classList.toggle("open");
}

// ================= NEWS =================
async function loadNews(){
 const box=document.getElementById("newsBox");

 const res=await fetch("https://api.coingecko.com/api/v3/status_updates");
 const data=await res.json();

 const news=(data.status_updates||[]).slice(0,3);

 box.innerHTML="";

 news.forEach(n=>{
  box.innerHTML+=`
  <div class="news">
   📰 ${n.description.slice(0,100)}...
  </div>`;
 });
}

// ================= MEMECOINS WITH PRICE + CHART =================
async function loadMemes(){

 const box=document.getElementById("memes");
 box.innerHTML="Loading...";

 // 1. trending coins
 const res=await fetch("https://api.coingecko.com/api/v3/search/trending");
 const data=await res.json();

 const coins = (data.coins||[]).slice(0,8);

 box.innerHTML="";

 for(let item of coins){

  let id = item.item.id;

  // 2. fetch market data
  let m = await fetch(
  `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${id}&sparkline=true`
  );

  let mdata = await m.json();
  let c = mdata[0];

  if(!c) continue;

  box.innerHTML+=`
  <div class="card">
   <h3>🚀 ${c.symbol.toUpperCase()}</h3>
   <p>$${c.current_price}</p>
   <p style="color:${c.price_change_percentage_24h>0?'lime':'red'}">
    ${c.price_change_percentage_24h.toFixed(2)}%
   </p>

   <canvas id="chart-${c.id}"></canvas>
  </div>`;

  // draw chart after render
  setTimeout(()=>{
   drawChart(`chart-${c.id}`, c.sparkline_in_7d.price);
  },200);
 }
}

// ================= SIMPLE CHART =================
function drawChart(id, data){
 const canvas=document.getElementById(id);
 if(!canvas) return;

 const ctx=canvas.getContext("2d");

 canvas.width=220;
 canvas.height=60;

 ctx.strokeStyle="#00ffff";
 ctx.beginPath();

 let min=Math.min(...data);
 let max=Math.max(...data);

 data.forEach((p,i)=>{
  let x=i*(220/data.length);
  let y=60-((p-min)/(max-min))*60;

  if(i===0) ctx.moveTo(x,y);
  else ctx.lineTo(x,y);
 });

 ctx.stroke();
}

// INIT
loadMemes();
loadNews();

</script>

</body>
</html>
