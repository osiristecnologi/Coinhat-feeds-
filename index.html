<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Pulse 🌍</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b0b1a;
    color:white;
}

header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#111133;
}

.menu {
    font-size:28px;
    cursor:pointer;
}

.search {
    flex:1;
    margin:0 10px;
    position:relative;
}

.search input {
    width:100%;
    padding:10px;
    border-radius:20px;
    border:none;
}

.panel {
    display:flex;
    flex-wrap:wrap;
    padding:10px;
}

.card {
    background:#1a1a33;
    margin:10px;
    padding:15px;
    border-radius:12px;
    width:200px;
}

.sidebar {
    position:fixed;
    left:-260px;
    top:0;
    width:250px;
    height:100%;
    background:#111;
    padding:10px;
    transition:0.3s;
}

.sidebar.open {
    left:0;
}

.lang button {
    margin:5px;
    padding:5px;
    cursor:pointer;
}

.section-title {
    margin:15px;
    font-size:18px;
    color:#00ffcc;
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
    <h3>Menu</h3>
    <button onclick="loadMemecoins()">🐸 Memecoins Top 10</button>
    <button onclick="loadNews()">📰 Crypto News</button>
</div>

<header>
    <div class="menu" onclick="toggleMenu()">🍔</div>

    <div class="search">
        <input id="search" placeholder="Search coin...">
    </div>

    <div class="lang">
        <button onclick="setLang('en')">EN</button>
        <button onclick="setLang('pt')">PT</button>
        <button onclick="setLang('es')">ES</button>
        <button onclick="setLang('zh')">ZH</button>
        <button onclick="setLang('ja')">JA</button>
        <button onclick="setLang('ar')">AR</button>
    </div>
</header>

<div class="section-title" id="titleCoins">Live Market</div>
<div class="panel" id="coins"></div>

<div class="section-title" id="titleExtra">Loading...</div>
<div class="panel" id="extra"></div>

<script>

let lang = "en";

const dict = {
 en:{market:"Live Market",memes:"Memecoins Top 10",news:"Crypto News"},
 pt:{market:"Mercado ao Vivo",memes:"Top 10 Memecoins",news:"Notícias Cripto"},
 es:{market:"Mercado en Vivo",memes:"Top Memecoins",news:"Noticias Cripto"},
 zh:{market:"实时市场",memes:"迷因币前10",news:"加密新闻"},
 ja:{market:"ライブ市場",memes:"ミームコインTOP10",news:"暗号ニュース"},
 ar:{market:"السوق المباشر",memes:"أفضل 10 ميمكوين",news:"أخبار العملات"}
};

function setLang(l){
 lang = l;
 document.getElementById("titleCoins").innerText = dict[l].market;
 document.getElementById("titleExtra").innerText = dict[l].memes;
 loadCoins();
}

function toggleMenu(){
 document.getElementById("sidebar").classList.toggle("open");
}

// ================= COINS =================
async function loadCoins(){
 const res = await fetch(
 "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=10&page=1&sparkline=false"
 );
 const data = await res.json();

 let box = document.getElementById("coins");
 box.innerHTML = "";

 data.forEach(c=>{
  box.innerHTML += `
   <div class="card">
    <h3>${c.symbol.toUpperCase()}</h3>
    <p>$${c.current_price}</p>
    <p style="color:${c.price_change_percentage_24h>0?'lime':'red'}">
    ${c.price_change_percentage_24h.toFixed(2)}%
    </p>
   </div>
  `;
 });
}

// ================= MEMECOINS =================
async function loadMemecoins(){
 const res = await fetch(
 "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&category=meme-token&order=market_cap_desc&per_page=10&page=1"
 );
 const data = await res.json();

 let box = document.getElementById("extra");
 box.innerHTML = "";

 data.forEach(c=>{
  box.innerHTML += `
   <div class="card">
    <h3>🐸 ${c.symbol.toUpperCase()}</h3>
    <p>$${c.current_price}</p>
   </div>
  `;
 });
}

// ================= NEWS (API READY) =================
async function loadNews(){

 // 🔴 Trocar por NewsAPI ou CryptoPanic key
 const fakeNews = [
  "Bitcoin breaks resistance level",
  "Ethereum gas fees drop",
  "New memecoin trend rises"
 ];

 let box = document.getElementById("extra");
 box.innerHTML = "";

 fakeNews.slice(0,3).forEach(n=>{
  box.innerHTML += `<div class="card">📰 ${n}</div>`;
 });
}

// ================= SEARCH =================
document.getElementById("search").addEventListener("input", async (e)=>{
 let q = e.target.value;
 if(q.length<2) return;

 const res = await fetch(`https://api.coingecko.com/api/v3/search?query=${q}`);
 const data = await res.json();

 let box = document.getElementById("coins");
 box.innerHTML = "";

 data.coins.slice(0,5).forEach(c=>{
  box.innerHTML += `
   <div class="card">
    <h3>${c.name}</h3>
    <p>${c.symbol}</p>
   </div>
  `;
 });
});

loadCoins();
setInterval(loadCoins, 15000);

</script>

</body>
</html>
