<script>

// helper
const el = id => document.getElementById(id);

// ================= LANG =================
let lang = 'pt';

function setLang(l, btn){
  lang = l;
  const t = i18n[l];

  el('nt-title').textContent = t.title;
  el('nt-sub').innerHTML = t.sub + ' · <span class="live"><span class="live-dot"></span>LIVE</span>';
  el('nt-news').textContent = t.news;
  el('nt-refresh').textContent = t.refresh;
  el('nt-vol').textContent = t.vol;
  el('nt-liq').textContent = t.liq;
  el('nt-mc').textContent = t.mc;
  el('nt-contract').textContent = t.contract;
  el('searchInput').placeholder = t.search;

  document.querySelectorAll('.lang-opt').forEach(e => e.classList.remove('selected'));
  if(btn) btn.classList.add('selected');

  toggleLang();
}

function toggleLang(){
  el('langMenu').classList.toggle('active');
}

// ================= CACHE =================
let cache = { data:null, time:0 };

// ================= FETCH LIMIT =================
async function fetchWithLimit(arr, limit=4){
  const results = [];
  const executing = [];

  for(const item of arr){
    const p = fetch(`https://api.dexscreener.com/latest/dex/tokens/${item.tokenAddress}`)
      .then(r=>r.json())
      .then(d=>d.pairs?.[0] || null)
      .catch(()=>null);

    results.push(p);

    if(limit <= arr.length){
      const e = p.then(()=>executing.splice(executing.indexOf(e),1));
      executing.push(e);
      if(executing.length >= limit){
        await Promise.race(executing);
      }
    }
  }

  return Promise.all(results);
}

// ================= LOAD =================
let memeData = [];

async function loadMemecoins(){
  const now = Date.now();

  // cache 20s
  if(cache.data && now - cache.time < 20000){
    renderMemes(cache.data);
    renderTicker(cache.data);
    return;
  }

  try{
    const res = await fetch('https://api.dexscreener.com/token-boosts/top/v1');
    const data = await res.json();

    const items = data.slice(0,12);
    const details = await fetchWithLimit(items, 4);

    memeData = details.filter(Boolean);

    cache = { data:memeData, time:now };

    renderMemes(memeData);
    renderTicker(memeData);

  }catch(e){
    console.error(e);
    el('memeGrid').innerHTML = '<p style="padding:20px;color:#888">Erro ao carregar</p>';
  }
}

// ================= RENDER =================
function renderMemes(pairs){
  const grid = el('memeGrid');
  grid.innerHTML = '';

  pairs.forEach((pair,i)=>{
    const name = pair.baseToken?.name || '—';
    const sym = pair.baseToken?.symbol || '—';
    const price = parseFloat(pair.priceUsd) || 0;
    const chg = pair.priceChange?.h24 || 0;
    const pos = chg >= 0;

    const card = document.createElement('div');
    card.className = 'meme-card';

    card.innerHTML = `
      <div class="meme-top">
        <img class="meme-logo" src="${pair.info?.imageUrl||''}">
        <div>
          <div class="meme-name">${name}</div>
          <div class="meme-sym">${sym}</div>
        </div>
      </div>

      <div>
        <span class="meme-price">$${price.toFixed(6)}</span>
        <span class="meme-chg ${pos?'pos':'neg'}">${chg.toFixed(2)}%</span>
      </div>
    `;

    // UX MELHOR
    card.onclick = ()=>{
      card.style.opacity = "0.6";
      openModal(pair);
    };

    grid.appendChild(card);
  });
}

// ================= TICKER =================
function renderTicker(pairs){
  const inner = el('tickerInner');

  inner.innerHTML = [...pairs,...pairs].map(p=>{
    const chg = p.priceChange?.h24 || 0;
    const pos = chg >= 0;

    return `
      <span class="ticker-item">
        ${p.baseToken?.symbol}
        $${parseFloat(p.priceUsd).toFixed(4)}
        <span class="${pos?'ticker-chg pos':'ticker-chg neg'}">
          ${chg.toFixed(2)}%
        </span>
      </span>
    `;
  }).join('');
}

// ================= NEWS =================
function openNews(){
  el('newsPanel').classList.add('open');
  el('overlay').classList.add('active');
}

function closeNews(){
  el('newsPanel').classList.remove('open');
  el('overlay').classList.remove('active');
}

// ================= SECURITY FIX =================
function openLink(url){
  window.open(url, '_blank', 'noopener,noreferrer');
}

// ================= INIT =================
loadMemecoins();
setInterval(loadMemecoins, 30000);

</script>
