<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinHatFeeds 🌍</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f5f7ff;
}

/* HEADER */
header{
 display:flex;
 align-items:center;
 justify-content:space-between;
 padding:10px;
 background:#fff;
 border-bottom:2px solid #00c2ff;
}

/* SEARCH */
.search{
 flex:1;
 margin:0 10px;
 position:relative;
}

.search input{
 width:100%;
 padding:10px 15px 10px 40px;
 border-radius:20px;
 border:1px solid #00c2ff;
}

.search span{
 position:absolute;
 left:10px;
 top:50%;
 transform:translateY(-50%);
}

/* MENU */
.icon{
 font-size:24px;
 cursor:pointer;
}

/* NEWS TOP */
.news-bar{
 background:#eaf6ff;
 padding:10px;
}

.news{
 margin:5px 0;
 font-size:14px;
}

/* CARDS */
.panel{
 display:flex;
 flex-wrap:wrap;
 padding:10px;
}

.card{
 background:#fff;
 margin:10px;
 padding:12px;
 border-radius:10px;
 width:220px;
 border:1px solid #d0eaff;
}

.title{
 margin:10px;
 color:#00aaff;
 font-weight:bold;
}

canvas{
 width:100%;
 height:60px;
}
</style>
</head>

<body>

<header>
 <div class="icon">☰</div>

 <div class="search">
  <span>🔍</span>
  <input id="search" placeholder="Buscar por contrato (0x... / sol...)">
 </div>

 <div class="icon">🌍</div>
</header>

<!-- NOTÍCIAS FIXAS -->
<div class="news-bar">
 <div class="news">📰 Bitcoin dispara com entrada institucional</div>
 <div class="news">📰 Ethereum reduz taxas e atrai novos usuários</div>
 <div class="news">📰 Memecoins da Solana voltam a bombar</div>
</div>

<div class="title">🚀 Memecoins em Alta</div>
<div class="panel" id="memes"></div>

<script>

// ================= SEARCH BY CONTRACT =================
document.getElementById("search").addEventListener("change", async (e)=>{

 let q = e.target.value.trim();
 if(!q) return;

 const res = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${q}`);
 const data = await res.json();

 const box = document.getElementById("memes");
 box.innerHTML = "";

 if(!data.pairs){
  box.innerHTML = "Token não encontrado";
  return;
 }

 data.pairs.slice(0,5).forEach(p=>{
  box.innerHTML += `
   <div class="card">
    <h3>${p.baseToken.symbol}</h3>
    <p>$${p.priceUsd || "?"}</p>
    <p>${p.baseToken.name}</p>
   </div>
  `;
 });

});

// ================= MEMECOINS =================
async function loadMemes(){

 const box = document.getElementById("memes");
 box.innerHTML="Carregando...";

 const res = await fetch("https://api.coingecko.com/api/v3/search/trending");
 const data = await res.json();

 const coins = data.coins.slice(0,8);

 box.innerHTML="";

 for(let i of coins){

  let id = i.item.id;

  let r = await fetch(
  `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${id}&sparkline=true`
  );

  let d = await r.json();
  let c = d[0];

  if(!c) continue;

  box.innerHTML += `
  <div class="card">
   <h3>${c.symbol.toUpperCase()}</h3>
   <p>$${c.current_price}</p>
   <canvas id="c-${c.id}"></canvas>
  </div>`;

  setTimeout(()=>{
   draw(`c-${c.id}`, c.sparkline_in_7d.price);
  },200);
 }
}

// ================= CHART =================
function draw(id,data){
 const c=document.getElementById(id);
 if(!c) return;

 const ctx=c.getContext("2d");
 c.width=220;
 c.height=60;

 ctx.strokeStyle="#00aaff";
 ctx.beginPath();

 let min=Math.min(...data);
 let max=Math.max(...data);

 data.forEach((p,i)=>{
  let x=i*(220/data.length);
  let y=60-((p-min)/(max-min))*60;

  i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
 });

 ctx.stroke();
}

// INIT
loadMemes();

</script>

</body>
</html>
