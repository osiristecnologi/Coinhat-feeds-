<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinHat Feeds 🐸</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Comic+Neue:wght@700&display=swap');

    body {
        margin: 0;
        font-family: 'Comic Neue', cursive;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        color: white;
        overflow-x: hidden;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 30px;
        background: rgba(0, 0, 0, 0.8);
        border-bottom: 4px solid #ff00ff;
        box-shadow: 0 0 20px #ff00ff;
        flex-wrap: wrap;
        gap: 15px;
    }

    .logo {
        font-size: 28px;
        font-weight: bold;
        text-shadow: 0 0 15px #00ff88, 0 0 25px #ffff00;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .search-container {
        flex: 1;
        max-width: 500px;
        position: relative;
    }

    .search-box {
        width: 100%;
        padding: 15px 20px 15px 55px;
        font-size: 18px;
        background: #1a0033;
        border: 3px solid #00ffff;
        border-radius: 50px;
        color: white;
        outline: none;
        box-shadow: 0 0 20px #00ffff;
    }

    .search-box:focus { box-shadow: 0 0 30px #ffff00; }

    .lupa {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 24px;
        color: #ffff00;
    }

    .container { display: flex; flex-wrap: wrap; }

    .feed { flex: 3; padding: 20px; min-width: 300px; }

    .coin {
        background: linear-gradient(145deg, #1a0033, #330066);
        margin: 15px 0;
        padding: 18px;
        border-radius: 20px;
        border: 3px solid #00ffff;
        box-shadow: 0 0 25px #00ffff, 0 0 40px rgba(255, 0, 255, 0.6);
    }

    .price {
        font-size: 28px;
        font-weight: bold;
    }

    .up { color: #00ff88; }
    .down { color: #ff4d4d; }

    .search-results {
        position: absolute;
        top: 100%;
        left: 0; right: 0;
        background: #1a0033;
        border: 3px solid #00ffff;
        border-top: none;
        border-radius: 0 0 20px 20px;
        max-height: 400px;
        overflow-y: auto;
        z-index: 100;
        display: none;
    }

    .search-item {
        padding: 12px 20px;
        cursor: pointer;
        border-bottom: 1px solid #00ffff33;
    }

    .search-item:hover {
        background: #ff00ff;
        color: black;
    }
</style>
</head>

<body>

<header>
    <div class="logo">🤠 CoinHat Feeds 🚀</div>

    <div class="search-container">
        <span class="lupa">🔎</span>
        <input type="text" id="searchInput" class="search-box" placeholder="Busque cripto...">
        <div class="search-results" id="searchResults"></div>
    </div>
</header>

<div class="container">
    <div class="feed">
        <h2>🚀 MERCADO MEME 🔥</h2>
        <div id="coins"></div>
    </div>
</div>

<script>
const defaultCoins = ["bitcoin", "dogecoin", "shiba-inu", "pepe", "ethereum"];

const emojis = {
    bitcoin: "₿",
    dogecoin: "🐶",
    "shiba-inu": "🐕",
    pepe: "🐸",
    ethereum: "⧫"
};

async function loadCoins() {
    const url = `https://api.coingecko.com/api/v3/simple/price?ids=${defaultCoins.join(',')}&vs_currencies=usd&include_24hr_change=true`;

    const container = document.getElementById("coins");
    container.innerHTML = "";

    try {
        const res = await fetch(url);
        const data = await res.json();

        for (let id of defaultCoins) {
            if (!data[id]) continue;

            let coin = data[id];
            let price = coin.usd.toLocaleString();
            let change = coin.usd_24h_change.toFixed(2);
            let emoji = emojis[id] || "🪙";

            container.innerHTML += `
                <div class="coin">
                    <strong>${emoji} ${id.toUpperCase()}</strong><br>
                    <div class="price">$${price}</div><br>
                    <span class="${change >= 0 ? "up" : "down"}">
                        24h: ${change}%
                    </span>
                </div>
            `;
        }
    } catch (e) {
        container.innerHTML = "Erro ao carregar dados...";
    }
}

// ================= SEARCH CORRIGIDA =================
let timeout;

async function searchCoins(q) {
    const box = document.getElementById("searchResults");

    if (q.length < 2) {
        box.style.display = "none";
        return;
    }

    const res = await fetch(`https://api.coingecko.com/api/v3/search?query=${q}`);
    const data = await res.json();

    box.innerHTML = "";

    data.coins.slice(0, 8).forEach(coin => {

        const emoji = coin.id === "pepe" ? "🐸" : "🪙";

        const item = document.createElement("div");
        item.className = "search-item";

        item.innerHTML = `${emoji} <strong>${coin.name}</strong> (${coin.symbol.toUpperCase()})`;

        item.onclick = () => {
            alert(`Selecionado: ${coin.name} (${coin.symbol.toUpperCase()})\nID: ${coin.id}`);
            box.style.display = "none";
            document.getElementById("searchInput").value = "";
        };

        box.appendChild(item);
    });

    box.style.display = "block";
}

document.getElementById("searchInput").addEventListener("input", (e) => {
    clearTimeout(timeout);
    timeout = setTimeout(() => searchCoins(e.target.value.trim()), 400);
});

document.addEventListener("click", (e) => {
    if (!e.target.closest(".search-container")) {
        document.getElementById("searchResults").style.display = "none";
    }
});

loadCoins();
setInterval(loadCoins, 12000);
</script>

</body>
</html>
